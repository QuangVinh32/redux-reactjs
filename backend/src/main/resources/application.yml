spring:
  application:
    name: shopbm-backend
  datasource:
    url: jdbc:mysql://localhost:3306/shopbm?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
    open-in-view: false
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jackson:
    time-zone: Asia/Ho_Chi_Minh
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: always

app:
  jwt:
    secret: ${JWT_SECRET:change-me-this-is-a-very-long-secret-for-hs512-jwt-signing-key-min-64-bytes-please}
    access-token-ttl-minutes: 60
    refresh-token-ttl-days: 30
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
  upload:
    dir: ${UPLOAD_DIR:./uploads}
    base-url: ${UPLOAD_BASE_URL:http://localhost:8080/uploads}
    max-size-bytes: 10485760
    allowed-content-types: image/jpeg,image/png,image/webp,image/gif,image/svg+xml
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}

logging:
  level:
    root: INFO
    com.shopbm: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
